<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<meta name="application-name" content="Voidscape">
	<meta name="theme-color" content="#000000">
	<meta name="format-detection" content="telephone=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="Voidscape">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="manifest" href="manifest.webmanifest">
	<link rel="icon" type="image/png" sizes="192x192" href="favicon.png">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	<title>Voidscape</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
			background: #000;
			color: #eadfbd;
			--viewport-height: 100vh;
			--game-aspect: 512 / 346;
			--game-aspect-ratio: 1.4797688;
			--mobile-control-size: 54px;
			--mobile-control-gap: 8px;
			--mobile-control-bg: rgba(8, 8, 12, 0.82);
			--mobile-control-bg-active: rgba(40, 27, 54, 0.92);
			--mobile-control-border: rgba(204, 181, 111, 0.72);
			--mobile-control-border-soft: rgba(108, 83, 144, 0.72);
			--mobile-control-text: #efe5c4;
			--mobile-control-frame: url("Cache/voidscape/ui/skin/top-tab-normal.png");
			--mobile-control-frame-active: url("Cache/voidscape/ui/skin/top-tab-active.png");
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: var(--viewport-height);
			min-height: 100vh;
			min-height: 100dvh;
			overflow: hidden;
			background: #000;
			overscroll-behavior: none;
			touch-action: none;
			-webkit-text-size-adjust: 100%;
			-webkit-user-select: none;
			user-select: none;
		}

		body {
			position: fixed;
			inset: 0;
		}

		main {
			position: fixed;
			inset: 0;
			box-sizing: border-box;
			background: #000;
			padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
			display: grid;
			place-items: center;
		}

		canvas {
			width: min(100vw, calc(var(--viewport-height) * var(--game-aspect-ratio)));
			height: auto;
			max-width: 100%;
			max-height: 100%;
			aspect-ratio: var(--game-aspect);
			display: block;
			background: #050505;
			image-rendering: pixelated;
			border: 0;
			outline: none;
			-webkit-touch-callout: none;
		}

		html.desktop body,
		html.tablet body {
			background:
				linear-gradient(180deg, #0b0a0d 0%, #040405 56%, #010101 100%);
		}

		html.desktop main,
		html.tablet main {
			padding:
				calc(env(safe-area-inset-top) + 78px)
				max(24px, env(safe-area-inset-right))
				max(24px, env(safe-area-inset-bottom))
				max(24px, env(safe-area-inset-left));
			background:
				linear-gradient(90deg, rgba(172, 135, 52, 0.08), transparent 22%, transparent 78%, rgba(105, 74, 154, 0.1)),
				linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.22) 40%, rgba(0, 0, 0, 0.5)),
				#050506;
		}

		html.desktop main {
			place-items: start center;
		}

		html.desktop canvas {
			width: min(512px, calc(100vw - 48px));
			height: auto;
			aspect-ratio: 512 / 346;
			max-height: calc(var(--viewport-height) - 120px);
		}

		#play-shell {
			position: fixed;
			z-index: 7;
			top: 0;
			left: 0;
			right: 0;
			display: none;
			box-sizing: border-box;
			padding: calc(env(safe-area-inset-top) + 14px) max(18px, env(safe-area-inset-right)) 0 max(18px, env(safe-area-inset-left));
			pointer-events: none;
		}

		html.desktop #play-shell,
		html.tablet #play-shell {
			display: block;
		}

		html.touch #play-shell {
			display: block;
			top: auto;
			left: auto;
			right: calc(env(safe-area-inset-right) + 52px);
			bottom: calc(max(8px, env(safe-area-inset-bottom)) + 6px);
			padding: 0;
		}

		html.touch body:not(.in-game) #play-shell {
			display: none;
		}

		html.touch #play-shell-bar {
			width: auto;
			min-height: 0;
			margin: 0;
			padding: 0;
			border: 0;
			background: transparent;
			box-shadow: none;
			pointer-events: none;
		}

		html.touch #play-shell-brand {
			display: none;
		}

		html.touch #resource-mode-control {
			display: grid;
			grid-template-columns: repeat(2, 48px);
			gap: 4px;
			pointer-events: auto;
		}

		html.touch .resource-mode-button {
			min-width: 0;
			width: 48px;
			height: 28px;
			padding: 0;
			border-radius: 5px;
			font-size: 9px;
		}

		#play-shell-bar {
			width: min(1180px, calc(100vw - 36px));
			min-height: 52px;
			margin: 0 auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 14px;
			box-sizing: border-box;
			padding: 8px 10px 8px 12px;
			border: 1px solid rgba(199, 179, 106, 0.46);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(0, 0, 0, 0.24)),
				rgba(6, 6, 9, 0.9);
			box-shadow:
				inset 0 0 0 1px rgba(0, 0, 0, 0.78),
				0 10px 26px rgba(0, 0, 0, 0.38);
			pointer-events: auto;
		}

		#play-shell-brand {
			min-width: 0;
			display: flex;
			align-items: center;
			gap: 10px;
			color: #efe5c4;
			text-shadow: 0 1px 0 #000;
			font-size: 15px;
			font-weight: 800;
			letter-spacing: 0;
			white-space: nowrap;
		}

		#play-shell-brand img {
			width: 30px;
			height: 30px;
			display: block;
			flex: 0 0 auto;
			image-rendering: auto;
		}

		#shell-runtime-label {
			margin-left: 8px;
			padding-left: 10px;
			border-left: 1px solid rgba(199, 179, 106, 0.28);
			color: #b9ad87;
			font-size: 12px;
			font-weight: 700;
		}

		#resource-mode-control {
			display: flex;
			align-items: center;
			gap: 6px;
			flex: 0 0 auto;
		}

		.resource-mode-button {
			position: relative;
			min-width: 68px;
			height: 34px;
			box-sizing: border-box;
			border: 1px solid rgba(199, 179, 106, 0.46);
			border-radius: 6px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.24)),
				rgba(17, 16, 21, 0.88);
			color: #d9cfaa;
			font: inherit;
			font-size: 11px;
			font-weight: 800;
			text-shadow: 0 1px 0 #000;
			cursor: pointer;
			-webkit-tap-highlight-color: transparent;
		}

		.resource-mode-button[aria-pressed="true"] {
			border-color: rgba(235, 211, 139, 0.86);
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.2)),
				rgba(58, 39, 79, 0.92);
			color: #fff1bd;
		}

		.resource-mode-button:active {
			transform: translateY(1px);
		}

		@media (max-width: 760px) {
			html.desktop main,
			html.tablet main {
				padding-top: calc(env(safe-area-inset-top) + 122px);
			}

			#play-shell-bar {
				align-items: stretch;
				flex-direction: column;
			}

			#resource-mode-control {
				width: 100%;
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}

			.resource-mode-button {
				min-width: 0;
			}
		}

			html.touch main {
				display: grid;
			}

			html.touch canvas {
				width: min(100%, calc(var(--viewport-height) * var(--game-aspect-ratio)));
				height: min(100%, calc(100vw / var(--game-aspect-ratio)));
				max-width: 100%;
				max-height: 100%;
				aspect-ratio: var(--game-aspect);
			}

		#status {
			position: fixed;
			left: max(10px, env(safe-area-inset-left));
			bottom: max(10px, env(safe-area-inset-bottom));
			max-width: min(460px, calc(100vw - 84px));
			padding: 7px 9px;
			box-sizing: border-box;
			border: 1px solid rgba(199, 179, 106, 0.35);
			background: rgba(0, 0, 0, 0.66);
			color: #d8cfac;
			font-size: 12px;
			line-height: 1.2;
			pointer-events: none;
			transition: opacity 200ms ease;
		}

		body.game-drawn #status {
			opacity: 0;
		}

		.mobile-control-button {
			position: fixed;
			z-index: 10;
			width: var(--mobile-control-size);
			height: var(--mobile-control-size);
			display: none;
			align-items: center;
			justify-content: center;
			box-sizing: border-box;
			border: 0;
			border-radius: 0;
			background: var(--mobile-control-frame) center / 100% 100% no-repeat;
			box-shadow: none;
			color: var(--mobile-control-text);
			font: inherit;
			font-size: 18px;
			font-weight: 700;
			text-shadow: 0 1px 0 #000;
			cursor: pointer;
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
			transition: opacity 160ms ease;
		}

		.mobile-control-button::before,
		.mobile-panel-button::before,
		.mobile-chat-button::before,
		.camera-control-button::before,
		#diagnostics-button::before,
		#diagnostics-copy-button::before {
			content: "";
			position: absolute;
			inset: 4px;
			border: 1px solid rgba(108, 83, 144, 0.55);
			border-radius: 6px;
			pointer-events: none;
		}

		.mobile-control-button::before {
			display: none;
		}

		#inventory-button {
			right: calc(env(safe-area-inset-right) + 64px);
			bottom: calc(max(10px, env(safe-area-inset-bottom)) + 52px);
		}

		#keyboard-button {
			right: calc(env(safe-area-inset-right) + 64px);
			bottom: max(10px, env(safe-area-inset-bottom));
		}

		.mobile-quick-button {
			right: calc(env(safe-area-inset-right) + 10px);
			width: 44px;
			height: 44px;
			font-size: 11px;
			line-height: 1.05;
			opacity: 0.72;
		}

		.mobile-quick-button.spell-shortcut {
			font-size: 9px;
			line-height: 1.05;
			white-space: pre-line;
			padding: 5px;
			overflow: hidden;
		}

		#panel-button {
			right: calc(env(safe-area-inset-right) + 10px);
			top: calc(50% - 106px);
			bottom: auto;
		}

		#chat-button {
			left: max(10px, env(safe-area-inset-left));
			top: calc(env(safe-area-inset-top) + 276px);
			bottom: auto;
		}

		#chat-button .mobile-control-icon {
			width: 30px;
			height: 30px;
			display: block;
			background: url("Cache/voidscape/ui/skin/bottom-chat-history-32.png") center / contain no-repeat;
			filter: drop-shadow(0 1px 0 #000);
			pointer-events: none;
		}

		#mobile-panel-drawer {
			position: fixed;
			z-index: 30;
			right: calc(env(safe-area-inset-right) + 74px);
			top: max(calc(env(safe-area-inset-top) + 10px), calc(50% - 122px));
			display: none;
			grid-template-columns: repeat(2, var(--mobile-control-size));
			grid-auto-rows: 50px;
			gap: var(--mobile-control-gap);
			padding: 8px;
			box-sizing: border-box;
			border: 1px solid var(--mobile-control-border);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.36)),
				rgba(4, 5, 8, 0.92);
			box-shadow:
				inset 0 0 0 1px rgba(0, 0, 0, 0.78),
				0 8px 22px rgba(0, 0, 0, 0.48);
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
		}

		.mobile-panel-button {
			position: relative;
			width: var(--mobile-control-size);
			height: 50px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-sizing: border-box;
			border: 1px solid rgba(204, 181, 111, 0.58);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(0, 0, 0, 0.34)),
				rgba(13, 12, 17, 0.86);
			color: var(--mobile-control-text);
			font: inherit;
			font-size: 11px;
			font-weight: 700;
			text-shadow: 0 1px 0 #000;
			cursor: pointer;
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
		}

		.mobile-panel-button:active {
			border-color: rgba(235, 211, 139, 0.9);
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.28)),
				var(--mobile-control-bg-active);
		}

		#mobile-chat-tray {
			position: fixed;
			z-index: 30;
			left: calc(env(safe-area-inset-left) + 74px);
			top: calc(env(safe-area-inset-top) + 276px);
			display: none;
			grid-template-columns: repeat(3, var(--mobile-control-size));
			grid-auto-rows: 50px;
			gap: var(--mobile-control-gap);
			padding: 8px;
			box-sizing: border-box;
			border: 1px solid var(--mobile-control-border);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.36)),
				rgba(4, 5, 8, 0.92);
			box-shadow:
				inset 0 0 0 1px rgba(0, 0, 0, 0.78),
				0 8px 22px rgba(0, 0, 0, 0.48);
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
		}

		.mobile-chat-button {
			position: relative;
			width: var(--mobile-control-size);
			height: 50px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 2px;
			box-sizing: border-box;
			border: 1px solid rgba(204, 181, 111, 0.58);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(0, 0, 0, 0.34)),
				rgba(13, 12, 17, 0.86);
			color: var(--mobile-control-text);
			font: inherit;
			font-size: 11px;
			font-weight: 700;
			text-shadow: 0 1px 0 #000;
			cursor: pointer;
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
		}

		.mobile-chat-icon {
			width: 24px;
			height: 24px;
			display: block;
			background-position: center;
			background-repeat: no-repeat;
			background-size: contain;
			filter: drop-shadow(0 1px 0 #000);
			pointer-events: none;
		}

		.mobile-chat-label {
			display: block;
			max-width: 48px;
			overflow: hidden;
			font-size: 9px;
			line-height: 1;
			text-align: center;
			text-overflow: ellipsis;
			white-space: nowrap;
			pointer-events: none;
		}

		.mobile-chat-button[data-chat="all"] .mobile-chat-icon {
			background-image: url("Cache/voidscape/ui/skin/bottom-chat-all-24.png");
		}

		.mobile-chat-button[data-chat="chat"] .mobile-chat-icon {
			background-image: url("Cache/voidscape/ui/skin/bottom-chat-history-24.png");
		}

			.mobile-chat-button[data-chat="quest"] .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-quest-24.png");
			}

			.mobile-chat-button[data-chat="global"] .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-history-24.png");
			}

			.mobile-chat-button[data-chat="private"] .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-private-24.png");
			}

		.mobile-chat-button[data-chat="compose"] .mobile-chat-icon {
			width: auto;
			min-width: 24px;
			height: 22px;
			background: none;
			color: var(--mobile-control-text);
			font-size: 20px;
			font-weight: 800;
			line-height: 22px;
			text-align: center;
		}

		.mobile-chat-button:active {
			border-color: rgba(235, 211, 139, 0.9);
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.28)),
				var(--mobile-control-bg-active);
		}

		.mobile-chat-button[data-chat="all"]:active .mobile-chat-icon {
			background-image: url("Cache/voidscape/ui/skin/bottom-chat-all-active-24.png");
		}

		.mobile-chat-button[data-chat="chat"]:active .mobile-chat-icon {
			background-image: url("Cache/voidscape/ui/skin/bottom-chat-history-active-24.png");
		}

			.mobile-chat-button[data-chat="quest"]:active .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-quest-active-24.png");
			}

			.mobile-chat-button[data-chat="global"]:active .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-history-active-24.png");
			}

			.mobile-chat-button[data-chat="private"]:active .mobile-chat-icon {
				background-image: url("Cache/voidscape/ui/skin/bottom-chat-private-active-24.png");
			}

		#camera-controls {
			position: fixed;
			left: max(10px, env(safe-area-inset-left));
			top: calc(env(safe-area-inset-top) + 174px);
			z-index: 10;
			display: none;
			grid-template-columns: repeat(2, 44px);
			grid-auto-rows: 44px;
			gap: 6px;
		}

		.camera-control-button {
			position: relative;
			width: 44px;
			height: 44px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-sizing: border-box;
			border: 1px solid rgba(204, 181, 111, 0.58);
			border-radius: 8px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(0, 0, 0, 0.34)),
				rgba(8, 8, 12, 0.78);
			box-shadow:
				inset 0 0 0 1px rgba(0, 0, 0, 0.78),
				0 4px 10px rgba(0, 0, 0, 0.36);
			color: var(--mobile-control-text);
			font: inherit;
			font-size: 17px;
			font-weight: 700;
			text-shadow: 0 1px 0 #000;
			cursor: pointer;
			touch-action: none;
			-webkit-tap-highlight-color: transparent;
		}

		.camera-control-button:active,
		.camera-control-button.is-held {
			border-color: rgba(235, 211, 139, 0.9);
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.28)),
				var(--mobile-control-bg-active);
		}

		html.touch body.game-drawn #keyboard-button {
			display: flex;
		}

		html.touch body.game-drawn.in-game .mobile-quick-button {
			display: flex;
		}

		html.touch body.game-drawn.in-game #panel-button {
			display: flex;
		}

		html.touch body.game-drawn.in-game.panel-drawer-open #mobile-panel-drawer {
			display: grid;
		}

		html.touch body.game-drawn.in-game.canvas-panel-rail-visible #panel-button,
		html.touch body.game-drawn.in-game.canvas-panel-rail-visible #mobile-panel-drawer {
			display: none;
		}

		html.touch body.game-drawn.in-game.canvas-panel-dock-visible #panel-button,
		html.touch body.game-drawn.in-game.canvas-panel-dock-visible #mobile-panel-drawer {
			display: none;
		}

		html.touch body.game-drawn.in-game.android-parity-canvas-panels #panel-button,
		html.touch body.game-drawn.in-game.android-parity-canvas-panels #mobile-panel-drawer {
			display: none;
		}

		html.touch body.game-drawn.in-game.chat-helper-visible #chat-button {
			display: flex;
		}

		html.touch body.game-drawn.in-game.chat-helper-visible.chat-tray-open #mobile-chat-tray {
			display: grid;
		}

		html.touch body.game-drawn.in-game #camera-controls {
			display: none;
		}

		html.touch.diagnostics body.game-drawn.in-game #camera-controls {
			display: grid;
		}

		html.touch body.keyboard-open #keyboard-button,
		html.touch body.panel-drawer-open #panel-button,
		html.touch body.chat-helper-visible.chat-tray-open #chat-button {
			display: flex;
			background: var(--mobile-control-frame-active) center / 100% 100% no-repeat;
		}

		html.touch body.chat-helper-visible.chat-tray-open #chat-button .mobile-control-icon {
			background-image: url("Cache/voidscape/ui/skin/bottom-chat-history-active-32.png");
		}

		html.touch body.game-drawn.in-game.canvas-panel-dock-visible #panel-button,
		html.touch body.game-drawn.in-game.canvas-panel-dock-visible #mobile-panel-drawer {
			display: none;
		}

		html.touch body.game-drawn.in-game #inventory-button {
			right: calc(env(safe-area-inset-right) + 10px);

							setResourceMode('normal', 'resume-button');
							forceResourceUpload('resume-button');
							event.preventDefault();
							event.stopPropagation();
						});
						resumeButton.addEventListener('click', function (event) {
							event.preventDefault();
							event.stopPropagation();
						});
					}
					var buttons = document.querySelectorAll('.resource-mode-button');
					for (var i = 0; i < buttons.length; i++) {
						(function (button) {
							button.addEventListener('pointerdown', function (event) {
								var mode = button.getAttribute('data-resource-mode') || 'normal';
								setResourceMode(mode, 'shell-button');
								forceResourceUpload('shell-button');
								event.preventDefault();
								event.stopPropagation();
							});
							button.addEventListener('click', function (event) {
								event.preventDefault();
								event.stopPropagation();
							});
						})(buttons[i]);
					}
					updateResourceControls();
				}

				window.__voidscapeUpdateViewportHeight = updateViewportHeight;
				window.__voidscapeLifecycleState = lifecycleState;
				window.__voidscapePostResumeProof = postResumeProof;
				window.__voidscapeRecordInputActivity = recordPostResumeInput;
				window.__voidscapeRecordClientState = recordPostResumeClientState;
				window.__voidscapeSetResourceMode = setResourceMode;
				window.__voidscapePrepareFrameUpload = prepareFrameUpload;
				window.__voidscapeRecordFrameUpload = recordFrameUpload;
				window.__voidscapeForceResourceUpload = forceResourceUpload;
				setResourceMode(initialResourceMode(), initialResourceSource());
				updateViewportHeight();
				applyProfileClass();
				configurePortalUrls();
				installResourceControls();
				installDiagnostics();
				window.addEventListener('resize', function () {
					forceResourceUpload('resize');
					updateViewportHeight();
				}, { passive: true });
				window.addEventListener('orientationchange', function () {
					forceResourceUpload('orientationchange');
					updateViewportHeight();
					window.setTimeout(updateViewportHeight, 90);
					window.setTimeout(updateViewportHeight, 360);
				}, { passive: true });
			window.addEventListener('scroll', lockScroll, { passive: true });
			window.addEventListener('blur', function (event) {
				markLifecycleEvent('blur', event);
			}, { passive: true });
			window.addEventListener('focus', function (event) {
				markLifecycleEvent('focus', event);
			}, { passive: true });
			window.addEventListener('pagehide', function (event) {
				markLifecycleEvent('pagehide', event);
			}, { passive: true });
			window.addEventListener('pageshow', function (event) {
				markLifecycleEvent('pageshow', event);
			}, { passive: true });
			document.addEventListener('visibilitychange', function (event) {
				markLifecycleEvent('visibilitychange', event);
			}, { passive: true });
			if (window.visualViewport) {
				window.visualViewport.addEventListener('resize', updateViewportHeight, { passive: true });
				window.visualViewport.addEventListener('scroll', updateViewportHeight, { passive: true });
			}
			document.addEventListener('gesturestart', function (event) {
				event.preventDefault();
			});
			document.addEventListener('dblclick', function (event) {
				event.preventDefault();
			});
			document.addEventListener('touchmove', function (event) {
				if (window.__voidscapeMobileProfile) {
					event.preventDefault();
				}
			}, { passive: false });
			document.addEventListener('touchend', function (event) {
				var now = Date.now();
				if (window.__voidscapeMobileProfile && now - lastTouchEndAt < 320) {
					event.preventDefault();
				}
				lastTouchEndAt = now;
			}, { passive: false });
		})();
		</script>
		<script>
			(function () {
				function updateStatus(message) {
					var status = document.getElementById('status');
					if (status) status.textContent = message;
				}

				function startClient() {
					if (typeof window.main === 'function') {
						window.main([]);
					} else {
						updateStatus('TeaVM main export was not found.');
					}
				}

				var shouldRun = true;
				if (typeof window.__voidscapeShouldRunWebClient === 'function') {
					shouldRun = window.__voidscapeShouldRunWebClient();
				}
				if (!shouldRun) return;

				var script = document.createElement('script');
				script.src = 'voidscape-web-client.js';
				script.async = true;
				script.onload = startClient;
				script.onerror = function () {
					updateStatus('Voidscape web client failed to load.');
				};
				document.body.appendChild(script);
			})();
		</script>
	</body>
	</html>

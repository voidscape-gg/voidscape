hatOcclusionPolicy:
  strategy: explicit-first-match
  rules:
    - id: no_hat
      match: {hatAppearanceIds: [0]}
      action: allow-v2
      reason: No headwear can occlude native hair.
    - id: unsupported_hat
      match: {anyNonzeroHat: true}
      action: fallback-legacy
      reason: Per-hat native occlusion masks are not approved yet.

  spawn_files:
    - "server/conf/server/defs/locs/SceneryLocsVoidArena.json"
    - "server/conf/server/defs/locs/SceneryLocsVoidColossusArena.json"
    - "server/conf/server/defs/locs/SceneryLocsVoidDungeon.json"
    - "server/conf/server/defs/locs/SceneryLocsVoidRift.json"
  drop_files: []

  test_notes:
    - "Import with Blender Z-up axis mapping, scale 128, and the default double-sided OB3 face fills."
    - "All existing scenery id 1306 placements are dependencies; their coordinates remain unchanged."
    - "Verify the recessed core remains visible and clickable from every camera quadrant."

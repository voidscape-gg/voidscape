# Voidscape content pack.

schema: voidscape-content/v1
kind: model
slug: void_rift_structure
name: "Void Rift structure"
description: "An original shattered voidstone basin, broken radial crown, and faceted tear for Void Rift portals."
status: integrated

gameplay:
  like: "voidriftportal"
  notes: "Visual replacement for existing scenery id 1306; footprint and portal behavior remain unchanged."

art:

<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Voidscape Appearance Studio</title><link rel="stylesheet" href="studio.css"></head>
<body><header><h1>Voidscape Appearance Studio</h1><span id="mode"></span></header><main><aside id="masters"></aside><section><div class="tools">
<button data-tool="paint">Paint</button><button data-tool="erase">Erase</button><button data-tool="pick">Pick</button><button id="undo">Undo</button><button id="redo">Redo</button><button id="clear">Clear</button>
<input id="brush" type="number" min="1" max="6" value="1"><input id="color" type="color" value="#848484"><button id="left">←</button><button id="up">↑</button><button id="down">↓</button><button id="right">→</button><button id="mirror">Mirror</button>
<label>Import<input id="import" type="file" accept="image/*"></label><button id="smaller">Scale −</button><button id="larger">Scale +</button><button id="applyImport">Apply</button><button id="cancelImport">Cancel</button><button id="anchors">Anchors</button><button id="heat">Overlap</button><button id="save">Save</button></div>
<div class="stage"><canvas id="canvas"></canvas></div></section><aside class="preview"><button id="actual">Actual size</button><button id="play">Playback</button><canvas id="preview"></canvas><pre id="status"></pre></aside></main><script src="studio.js"></script></body></html>
